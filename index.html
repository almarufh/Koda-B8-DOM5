<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Password Toggle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="btnNavbar">
            <button type="button"><img src="menu.svg" alt="button"></button>
        </div>
        <ul>
            <li>Setting</li>
            <li>Ganti Password</li>
            <li>Lupa Password</li>
        </ul>
    </nav>
    <div class="page-password">
        <div class="password">
            <input type="password" id="password">
            <button type="button" id="btn">
                <img src="eye.svg" id="eyeIcon" alt="eye">
            </button>
        </div>
    </div>

    <script>
        const passwordInput = document.getElementById("password");
        const toggleBtn = document.getElementById("btn");
        const eyeIcon = document.querySelector(".password > button > img");

        toggleBtn.addEventListener("click", () => {
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                eyeIcon.src = "eye-off.svg";
            } else {
                passwordInput.type = "password";
                eyeIcon.src = "eye.svg";
            }
        });

        const menuBtn = document.querySelector(".btnNavbar button");
        const navList = document.querySelector("nav > ul"); 

        menuBtn.addEventListener("click", () => {
            navList.classList.toggle("active");
        });
    </script>
</body>
</html>
